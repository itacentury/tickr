<!-- Undo Toast -->
<div
  class="toast"
  data-el="undoToast"
  role="status"
  aria-live="polite"
  aria-atomic="true"
>
  <span class="toast-message" data-el="toastMessage"></span>
  <button class="toast-action" data-el="toastUndo">Undo</button>
  <button class="toast-close" data-el="toastClose" title="Close">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <div class="toast-progress" data-el="toastProgress"></div>
</div>
<div
  class="toast error-toast"
  data-el="errorToast"
  role="alert"
  aria-live="assertive"
  aria-atomic="true"
>
  <span class="toast-message" data-el="errorToastMessage"></span>
  <button class="toast-close" data-el="errorToastClose" title="Close">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <div class="toast-progress" data-el="errorToastProgress"></div>
</div>
