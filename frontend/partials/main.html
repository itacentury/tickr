<!-- Main Content -->
<main class="main-content" id="main-content" tabindex="-1">
  <header class="header">
    <button
      class="mobile-menu-btn"
      data-el="mobileMenuBtn"
      aria-label="Open menu"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <span class="list-title-icon" data-el="listTitleIcon"></span>
    <h1 class="list-title" data-el="listTitle">Todos</h1>
    <span class="sync-indicator" data-el="syncIndicator">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path
          d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
        ></path>
      </svg>
      Syncing
    </span>
    <div class="header-actions">
      <button class="edit-list-btn" data-el="editListBtn" title="Edit list">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
          ></path>
          <path
            d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
          ></path>
        </svg>
      </button>
      <button class="history-btn" data-el="historyBtn" title="Show history">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </button>
    </div>
  </header>
  <!-- Add Item Form -->
  <form class="add-item-form" data-el="addItemForm">
    <div class="add-item-field">
      <input
        type="text"
        class="add-item-input"
        data-el="addItemInput"
        placeholder="Add new item..."
        autocomplete="off"
        aria-autocomplete="list"
        aria-controls="add-item-category-autocomplete"
      />
      <ul
        class="category-autocomplete"
        id="add-item-category-autocomplete"
        data-el="addItemCategoryAutocomplete"
        role="listbox"
        hidden
      ></ul>
    </div>
    <button type="submit" class="add-item-btn" aria-label="Add">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </form>
  <!-- Items List -->
  <ul class="items-list" data-el="itemsList">
    <!-- Items will be populated by JS -->
  </ul>
  <!-- Empty State -->
  <div class="empty-state" data-el="emptyState">
    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <path
        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
      ></path>
    </svg>
    <p>This list is empty</p>
    <span>Add your first item</span>
  </div>
</main>
