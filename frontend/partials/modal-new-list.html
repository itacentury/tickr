<!-- Modal for new list -->
<div class="modal" data-el="newListModal">
  <div class="modal-content">
    <h2>Create New List</h2>
    <form data-el="newListForm">
      <input
        type="text"
        data-el="newListName"
        placeholder="List name"
        autocomplete="off"
        required
      />
      <div class="icon-picker">
        <button
          type="button"
          class="icon-picker-toggle"
          data-el="iconPickerToggle"
        >
          <span class="icon-preview" data-el="iconPreview">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </span>
          <span class="icon-picker-label">Choose icon</span>
          <svg
            class="chevron"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="icon-options" data-el="iconOptions">
          <input
            type="text"
            class="icon-search"
            placeholder="Search icons…"
            aria-label="Search icons"
            autocomplete="off"
          />
          <div class="icon-grid">
            <!-- Populated dynamically by JS from the icons object -->
          </div>
          <p class="icon-no-results" role="status" aria-live="polite" hidden>
            No icons found
          </p>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" data-el="cancelNewList">
          Cancel
        </button>
        <button type="submit" class="btn-create">Create</button>
      </div>
    </form>
  </div>
</div>
