<!doctype html>
<html lang="en">
  <head>
    <!--
      Reload-loop circuit breaker. A classic, same-origin script (CSP forbids
      inline scripts) that runs before the deferred app bundle, so it self-heals
      a runaway reload loop even if the bundle or service worker is the cause.
    -->
    <script src="/circuit-breaker.js"></script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#0d0d0f" />
    <meta name="description" content="Your tasks, simply done" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Tickr" />
    <title>Tickr</title>
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/favicon-16x16.png"
    />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="app">
      <!-- @include partials/sidebar.html -->
      <!-- @include partials/main.html -->
      <!-- @include partials/history-panel.html -->
      <!-- Overlay for mobile -->
      <div class="overlay" data-el="overlay"></div>
    </div>
    <!-- @include partials/modal-new-list.html -->
    <!-- @include partials/modal-edit-list.html -->
    <!-- @include partials/modal-edit-item.html -->
    <!-- @include partials/modal-settings.html -->
    <!-- @include partials/modal-metrics.html -->
    <!-- @include partials/toasts.html -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
