name: Docker

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  schedule:
    - cron: "0 0 * * 0" # every Sunday at midnight

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success'
    outputs:
      should_build: ${{ github.event_name == 'schedule' || steps.filter.outputs.source == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for source changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            source:
              - 'backend/**'
              - 'frontend/**'
              - 'Dockerfile'
              - 'entrypoint.sh'
              - 'pyproject.toml'

  docker:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Read version
        id: ver
        run: echo "v=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/tickr
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.v }}
            type=sha

      - name: Build local image for SBOM scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: tickr:sbom-scan
          cache-from: type=gha

      - name: Generate SBOM from Docker image
        uses: anchore/sbom-action@v0
        with:
          image: tickr:sbom-scan
          format: cyclonedx-json
          artifact-name: sbom-docker.cdx.json

      - name: Scan for vulnerabilities
        uses: anchore/scan-action@v6
        with:
          image: tickr:sbom-scan
          fail-build: false
          severity-cutoff: critical

      - name: Build and push with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
