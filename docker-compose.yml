services:
  tickr:
    image: hoffmanju/tickr:latest
    container_name: tickr
    restart: unless-stopped
    ports:
      - 127.0.0.1:8000:8000/tcp
    # Keep secrets out of version control via an env file. Use the long syntax
    # with `format: raw` so Compose does NOT interpolate the `$` characters in an
    # argon2 hash (otherwise it mangles TICKR_PASSWORD_HASH — see README).
    # env_file:
    #   - path: tickr.env
    #     format: raw
    # environment:
    #   - TICKR_DATABASE=data/tickr.db
    #   - TICKR_RATE_LIMIT_REQUESTS=100
    #   - TICKR_MAX_SSE_CLIENTS=10
    #   - TICKR_CORS_ORIGINS=https://app.example.com,https://admin.example.com
    #   # --- Authentication (single password) ---
    #   - TICKR_AUTH_ENABLED=true
    #   # Behind HTTPS keep this true; for local plain-HTTP testing set it false:
    #   - TICKR_COOKIE_SECURE=true
    volumes:
      - ./data:/app/data
